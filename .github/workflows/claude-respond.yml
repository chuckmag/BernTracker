# Respond to @claude mentions in PR / issue comments and inline review comments.
#
# Default model: Sonnet 4.6. Switches to Opus 4.7 only when the comment
# contains the literal phrase "@claude deep-review" — reserved for hard
# architectural questions or large/risky PRs.
#
# To fall back to Haiku when session budget is tight, swap DEFAULT_MODEL below
# to claude-haiku-4-5-20251001.

name: claude-respond

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Per-PR concurrency: a new @claude comment cancels the in-flight response.
# `issue.number` is the PR number for PR comments; for issue_comment events on
# issues (not PRs), the action will no-op when no PR context exists.
concurrency:
  group: claude-respond-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  respond:
    # Gate: only run when the comment mentions @claude AND was authored by a
    # human or another bot we trust. Skip our own comments to avoid loops.
    if: |
      contains(github.event.comment.body, '@claude') &&
      github.event.comment.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      DEFAULT_MODEL: claude-sonnet-4-6
      DEEP_REVIEW_MODEL: claude-opus-4-7
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pick model
        id: pick
        env:
          BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          if echo "$BODY" | grep -qiE '@claude[[:space:]]+deep-review'; then
            echo "model=$DEEP_REVIEW_MODEL" >> "$GITHUB_OUTPUT"
            echo "Selected Opus for deep-review."
          else
            echo "model=$DEFAULT_MODEL" >> "$GITHUB_OUTPUT"
            echo "Selected default model: $DEFAULT_MODEL"
          fi

      - name: Run Claude
        uses: anthropics/claude-code-action@1dc994ee7a008f0ecc866d9ac23ef036b7229f84  # v1 (resolved 2026-05-20)
        with:
          # Auth: uses the repo owner's Claude Max/Pro subscription via OAuth.
          # See claude-review.yml for setup notes + the API-key fallback line.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model ${{ steps.pick.outputs.model }}
            --max-turns 20
            --allowed-tools "Read,Grep,Glob,Edit,Write,Skill,Bash(gh *),Bash(git *),Bash(jq *)"

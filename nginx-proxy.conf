resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name local.wodalytics.com;

    location /api/ {
        set $backend "api:3000";
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        set $backend "keycloak:8080";
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Upstream health probes — mirrors the Railway nginx config so the same
    # curl commands work locally and in production.
    location = /health/api {
        set $backend "api:3000";
        rewrite ^ /api/health break;
        proxy_pass http://$backend;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_intercept_errors on;
        error_page 502 503 504 =503 @api_down;
        access_log off;
    }
    location @api_down {
        default_type application/json;
        return 503 '{"status":"down","upstream":"api"}';
    }

    location = /health/auth {
        set $backend "keycloak:8080";
        rewrite ^ /auth/realms/wodalytics break;
        proxy_pass http://$backend;
        proxy_connect_timeout 3s;
        proxy_read_timeout 5s;
        proxy_intercept_errors on;
        error_page 502 503 504 =503 @auth_down;
        access_log off;
    }
    location @auth_down {
        default_type application/json;
        return 503 '{"status":"down","upstream":"auth"}';
    }

    location / {
        set $backend "web:80";
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name db-studio.local.wodalytics.com;

    location / {
        set $backend "studio:5555";
        proxy_pass http://$backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

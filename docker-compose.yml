name: wodalytics

services:
  proxy:
    image: nginx:alpine
    container_name: wodalytics-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
      - studio
      - keycloak

  postgres:
    image: postgres:16
    container_name: wodalytics-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wodalytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Keycloak authorization server. Imports realm-wodalytics.json on first boot.
  # Admin console: http://local.wodalytics.com/auth/admin  (admin / admin)
  # OIDC discovery: http://local.wodalytics.com/auth/realms/wodalytics/.well-known/openid-configuration
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: wodalytics-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME: local.wodalytics.com
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
    volumes:
      - ./infra/keycloak/realm-wodalytics.json:/opt/keycloak/data/import/realm-wodalytics.json:ro
    ports:
      - "8080:8080"

  api:
    image: wodalytics-api:local
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: wodalytics-api
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wodalytics
      NODE_ENV: development
      ALLOWED_ORIGINS: http://local.wodalytics.com,http://localhost:5173
      FRONTEND_URL: http://local.wodalytics.com
      KEYCLOAK_ISSUER_URL: http://local.wodalytics.com/auth/realms/wodalytics
    depends_on:
      - postgres
      - keycloak

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: wodalytics-web
    depends_on:
      - api

  studio:
    image: wodalytics-api:local
    container_name: wodalytics-studio
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wodalytics
    command: sh -c "npx prisma studio --schema=packages/db/prisma/schema.prisma --port 5555 --browser none --hostname 0.0.0.0"
    depends_on:
      - postgres
      - api

  # One-shot cron-job runner — mirrors a Railway cron service. Job is selected
  # by `JOB_NAME`, the same env var the Railway services use. Behind the `jobs`
  # profile so it does not auto-start with `docker compose up`.
  #
  # Run the default crossfit-wod tick:
  #   docker compose --profile jobs run --rm jobs
  # Run a different job:
  #   docker compose --profile jobs run --rm -e JOB_NAME=noop jobs
  # Force a rebuild of the jobs image first:
  #   docker compose --profile jobs build jobs
  jobs:
    image: wodalytics-jobs:local
    build:
      context: .
      dockerfile: apps/jobs/Dockerfile
    container_name: wodalytics-jobs
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wodalytics
      NODE_ENV: production
      JOB_NAME: crossfit-wod
    depends_on:
      - postgres
    restart: "no"
    profiles:
      - jobs

volumes:
  postgres_data:
